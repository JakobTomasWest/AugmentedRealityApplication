ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [ com.augmentedreality.server.ApplicationKt.module ]
  }
}

jwt {
  # sensible dev defaults
  secret   = "dev-super-secret"
  issuer   = "http://localhost/"
  audience = "my-audience"
  realm    = "My realm"

  # allow environment overrides (optional; used by Docker/CI)
  secret   = ${?SECRET}
  issuer   = ${?ISSUER}
  audience = ${?AUDIENCE}
  realm    = ${?REALM}
}

#
ldap {
  url      = "ldap://localhost:1389"
  baseDn   = "dc=ldap,dc=asd,dc=msd,dc=localhost"
  bindDn   = "cn=admin,dc=ldap,dc=asd,dc=msd,dc=localhost"
  bindPw   = "adminpassword"

  # allow Compose to point at the LDAP container
  url      = ${?LDAP_URL}
  baseDn   = ${?LDAP_BASE_DN}
  bindDn   = ${?LDAP_BIND_DN}
  bindPw   = ${?LDAP_BIND_PW}
}

upload {
  # default local path; Compose will set UPLOAD_ROOT=/app/uploads
  root = "uploads"
  root = ${?UPLOAD_ROOT}
}

ml {
  # Docker publishes the ML container on 8001 for host-run Gradle Ktor.
  # Compose app containers override this to http://ml:8000.
  url = "http://localhost:8001"
  url = ${?ML_URL}
}
